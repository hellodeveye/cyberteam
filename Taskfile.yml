version: '3'

vars:
  BIN_DIR: bin

env:
  CGO_ENABLED: 0

tasks:
  default:
    desc: Show all available tasks
    cmds:
      - task --list

  build:
    desc: Build all components
    cmds:
      - task build:boss
      - task build:staffs

  build:boss:
    desc: Build Boss (Project Manager)
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/boss ./cmd/boss

  build:staffs:
    desc: Build all Staff
    cmds:
      - task build:staff:product
      - task build:staff:developer
      - task build:staff:tester

  build:staff:product:
    desc: Build Product Manager
    cmds:
      - go build -o cmd/staff/product/product ./cmd/staff/product

  build:staff:developer:
    desc: Build Developer
    cmds:
      - go build -o cmd/staff/developer/developer ./cmd/staff/developer

  build:staff:tester:
    desc: Build Tester
    cmds:
      - go build -o cmd/staff/tester/tester ./cmd/staff/tester

  run:
    desc: Build and run the full system
    deps: [build]
    cmds:
      - ./{{.BIN_DIR}}/boss

  clean:
    desc: Clean all build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
      - rm -f cmd/staff/product/product
      - rm -f cmd/staff/developer/developer
      - rm -f cmd/staff/tester/tester

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  check:
    desc: Full check
    cmds:
      - task fmt
      - task vet
      - go build ./...

  mod:
    desc: Tidy go modules
    cmds:
      - go mod tidy
